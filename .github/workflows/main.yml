name: Site Build & Cleanup

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Next.js Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  cleanup:
    name: Cleanup Artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing artifacts
        uses: geekyeggo/delete-artifact@v4
        with:
          name: |
            *
          useGlob: true
